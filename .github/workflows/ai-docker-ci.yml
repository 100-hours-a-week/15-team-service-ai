name: AI Server CI (Verification Only)

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches: ["main", "dev", "feature/ci"]

# 동시 실행 제어함(같은 브랜치에 여러 커밋이 오면 이전 작업 취소)
concurrency:
  group: ci-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    # AWS OIDC 인증 및 보안 분석을 위한 권한 설정
    permissions:
      id-token: write
      contents: read
      security-events: write
      
    steps:
      # ──────────────────────────────────────────
      # Phase 1: 사전 검증 (Docker 빌드 전, Fail-fast)
      # ──────────────────────────────────────────

      # 1. 소스 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Trivy Scan (Secret + Vuln checking) - Fail Fast
      # 시크릿 유출과 의존성 취약점을 빌드 전에 가장 먼저 잡아냅니다.
      - name: Trivy Scan (Secret + Vuln)
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "secret,vuln"
          format: "table"
          exit-code: "1"
          ignore-unfixed: "true"

      # 3. 빠른 정적 분석 lint, formmatting
      # 3. 빠른 정적 분석 lint, formatting (uv 사용)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install -U uv

      - name: Install dependencies (uv)
        run: uv sync --frozen --only-dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Formatting check (ruff)
        run: uv run ruff format --check .


      # ──────────────────────────────────────────
      # Phase 2: Docker 테스트 이미지 빌드
      # ──────────────────────────────────────────

      # 5. AWS 자격 증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      # 6. AWS ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 7. Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 8. 테스트 이미지 빌드 (Target: test)
      - name: Build Test Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: test
          tags: ai-server:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ──────────────────────────────────────────
      # Phase 3: 심층 검사 (Inside Docker)
      # ──────────────────────────────────────────

      # 9. Tests (pytest) — 단위/통합 테스트
      - name: Create results directories
        run: mkdir -p test-results coverage

      - name: Tests (pytest)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            -v ${{ github.workspace }}/coverage:/app/coverage \
            ai-server:test \
            pytest -q \
            --junitxml=test-results/junit.xml \
            --cov=. \
            --cov-report=xml:coverage/coverage.xml

      # ──────────────────────────────────────────
      # Phase 5: 마무리
      # ──────────────────────────────────────────

      # 10. 테스트 결과 리포트 업로드
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-reports
          path: |
            test-results/
            coverage/
          retention-days: 1

  # 보안 분석 작업 (병렬 실행)
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"